name: MahjongPaper
main: doublemoon.mahjongcraft.paper.MahjongPaperPlugin
version: ${version}
api-version: "1.21.11"
author: OpenAI
description: Riichi Mahjong Paper plugin rewrite built around display entities, item_model and PacketEvents.
depend:
  - packetevents
commands:
  mahjong:
    description: Manage MahjongPaper tables
    usage: /mahjong <create|join|leave|list|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|render|clear>
    permission: mahjongpaper.command
permissions:
  mahjongpaper.command:
    default: true
