common.only_players=<red>只有玩家可以使用这个指令。</red>
command.usage=<yellow>用法:</yellow> <gray>/mahjong help|create|join|leave|list|spectate|unspectate|addbot|removebot|rule|start|state|riichi|tsumo|ron|pon|minkan|chii|kan|skip|kyuushu|settlement|render|clear</gray>
command.help.create=<gray>/mahjong create</gray> <white>- 在你当前位置创建一张新牌桌。</white>
command.help.join=<gray>/mahjong join <table_id></gray> <white>- 作为玩家加入已有牌桌。</white>
command.help.leave=<gray>/mahjong leave</gray> <white>- 离开当前牌桌，或退出观战。</white>
command.help.list=<gray>/mahjong list</gray> <white>- 查看所有活动牌桌及其位置。</white>
command.help.spectate=<gray>/mahjong spectate <table_id></gray> <white>- 以观战者身份进入牌桌，不占座位。</white>
command.help.unspectate=<gray>/mahjong unspectate</gray> <white>- 退出当前观战的牌桌。</white>
command.help.addbot=<gray>/mahjong addbot</gray> <white>- 给空座位补一个 Bot。</white>
command.help.removebot=<gray>/mahjong removebot</gray> <white>- 在开局前移除一个 Bot。</white>
command.help.rule=<gray>/mahjong rule [key] [value]</gray> <white>- 查看或修改开局前的牌桌规则。</white>
command.help.start=<gray>/mahjong start</gray> <white>- 当 4 个座位满员后开始牌局。</white>
command.help.state=<gray>/mahjong state</gray> <white>- 查看当前牌桌和牌局状态。</white>
command.help.riichi=<gray>/mahjong riichi <hand_index></gray> <white>- 宣告立直，并打出指定手牌索引的牌。</white>
command.help.tsumo=<gray>/mahjong tsumo</gray> <white>- 在满足条件时宣告自摸。</white>
command.help.ron=<gray>/mahjong ron</gray> <white>- 对他家打出的牌宣告荣和。</white>
command.help.pon=<gray>/mahjong pon</gray> <white>- 在当前反应窗口执行碰牌。</white>
command.help.minkan=<gray>/mahjong minkan</gray> <white>- 在当前反应窗口执行明杠。</white>
command.help.chii=<gray>/mahjong chii <tile_a> <tile_b></gray> <white>- 用手里的两张指定牌执行吃牌。</white>
command.help.kan=<gray>/mahjong kan <tile></gray> <white>- 用指定牌种宣告暗杠或加杠。</white>
command.help.skip=<gray>/mahjong skip</gray> <white>- 放弃当前可执行的反应操作。</white>
command.help.kyuushu=<gray>/mahjong kyuushu</gray> <white>- 宣告九种九牌流局。</white>
command.help.settlement=<gray>/mahjong settlement</gray> <white>- 重新打开本桌最近一次结算界面。</white>
command.help.render=<gray>/mahjong render</gray> <white>- 强制刷新牌桌展示实体。</white>
command.help.clear=<gray>/mahjong clear</gray> <white>- 清除当前牌桌的展示实体。</white>
